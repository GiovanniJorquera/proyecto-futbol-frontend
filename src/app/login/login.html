<div class="login-container">
  <p-card class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="login-subtitle">Ingresa tus credenciales para continuar.</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="campo">
        <label>Usuario</label>
        <input pInputText formControlName="user" placeholder="admin" />
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <input pInputText type="password" formControlName="password" placeholder="*******" />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="login-actions">
        <button pButton type="submit" label="Ingresar" class="login-btn"></button>
        <button pButton type="button" label="Volver" class="volver-btn" (click)="volver()"></button>
      </div>
    </form>
  </p-card>
</div>
